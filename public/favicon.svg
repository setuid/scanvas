<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  <!-- Open book -->
  <g transform="translate(50,52)">
    <!-- Left page -->
    <path d="M-4,18 L-4,-16 Q-4,-22 -10,-22 L-34,-22 Q-38,-22 -38,-18 L-38,18 Q-38,22 -34,22 L-4,22 Z" fill="#2a2a4a" stroke="#d4a843" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M4,18 L4,-16 Q4,-22 10,-22 L34,-22 Q38,-22 38,-18 L38,18 Q38,22 34,22 L4,22 Z" fill="#2a2a4a" stroke="#d4a843" stroke-width="1.5"/>
    <!-- Spine -->
    <path d="M-4,-22 Q0,-26 4,-22 L4,22 Q0,26 -4,22 Z" fill="#d4a843" opacity="0.3"/>
    <!-- Left page lines -->
    <line x1="-32" y1="-14" x2="-10" y2="-14" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="-32" y1="-8" x2="-10" y2="-8" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="-32" y1="-2" x2="-10" y2="-2" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="-32" y1="4" x2="-18" y2="4" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <!-- Right page lines -->
    <line x1="10" y1="-14" x2="32" y2="-14" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="-8" x2="32" y2="-8" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="-2" x2="32" y2="-2" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="4" x2="24" y2="4" stroke="#d4a843" stroke-width="1" opacity="0.4"/>
    <!-- Pen/quill accent -->
    <path d="M20,8 L30,-18 L32,-20 Q34,-22 33,-20 L28,-10 L22,10 Z" fill="#d4a843" opacity="0.7"/>
  </g>
</svg>
