<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Story Canvas</title>
    <script>
      // Redirect all 404s to index.html for SPA support on GitHub Pages
      var pathSegmentsToKeep = 1; // '/scanvas'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/#/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (l.search ? l.search : '') +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
